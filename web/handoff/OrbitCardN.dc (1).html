<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<article style="display:flex;flex-direction:column;background:#FFFFFF;border:1px solid #EAEAE6;border-radius:14px;overflow:hidden;transition:transform .2s ease,box-shadow .2s ease,border-color .2s ease;height:100%;font-family:'Hanken Grotesk',sans-serif" style-hover="transform:translateY(-3px);box-shadow:0 16px 38px -20px rgba(40,35,28,.4);border-color:#DCD8D1">
  <div style="position:relative;aspect-ratio:9/16;overflow:hidden;background:#EFEDE8">
    <div style="position:absolute;inset:0;background: {{ v.posterN }}"></div>
    <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(28,24,18,.5) 0%,rgba(28,24,18,0) 40%)"></div>
    <span style="position:absolute;left:11px;top:11px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;background:rgba(255,255,255,.92);color:#17171A;padding:4px 8px;border-radius:7px">{{ v.platformLabel }}</span>
    <button style="position:absolute;right:11px;top:11px;width:31px;height:31px;border:none;border-radius:9px;background:rgba(255,255,255,.9);color:#17171A;font-size:13px;cursor:pointer;display:grid;place-items:center;transition:all .15s ease" style-hover="background:#fff;color:#C2541E;transform:scale(1.08)">&#9829;</button>
    <div style="position:absolute;left:11px;bottom:12px;display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.94);border-radius:9px;padding:5px 9px;box-shadow:0 2px 10px rgba(0,0,0,.14)">
      <span style="width:7px;height:7px;border-radius:999px;background:#C2541E"></span>
      <span style="font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:#17171A">{{ v.scoreFmt }}</span>
      <span style="font-family:'JetBrains Mono',monospace;font-size:8px;color:#9A9A96;letter-spacing:.06em">TS</span>
    </div>
    <span style="position:absolute;right:12px;bottom:15px;font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(255,255,255,.92)">{{ v.viewsFmt }}</span>
  </div>
  <div style="display:flex;flex-direction:column;gap:9px;padding:13px 14px 15px">
    <div style="display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:10px;color:#A5A29B">
      <span>{{ v.rank2 }}</span><span aria-hidden="true">&middot;</span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#6E6B64">{{ v.handle }}</span><span aria-hidden="true">&middot;</span><span>{{ v.time }}</span>
    </div>
    <p style="margin:0;font-size:14px;font-weight:500;line-height:1.32;color:#17171A;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:37px">{{ v.caption }}</p>
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
      <span style="display:inline-flex;align-items:center;gap:6px">
        <svg width="50" height="18" viewBox="0 0 52 18" fill="none"><polyline points="{{ v.spark }}" stroke="#C2541E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></polyline></svg>
        <span style="font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.06em;color:#A5A29B">tempo</span>
      </span>
      <span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:#C2541E;background:#F6ECE3;border-radius:7px;padding:3px 8px">&#9650; {{ v.outlier }} snittet</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;border-top:1px solid #F0EEE9;padding-top:10px">
      <div><div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#17171A">{{ v.viewsFmt }}</div><div style="font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.06em;text-transform:uppercase;color:#B4B1A9;margin-top:2px">Visn.</div></div>
      <div><div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#17171A">{{ v.likesFmt }}</div><div style="font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.06em;text-transform:uppercase;color:#B4B1A9;margin-top:2px">Likes</div></div>
      <div><div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#17171A">{{ v.commentsFmt }}</div><div style="font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.06em;text-transform:uppercase;color:#B4B1A9;margin-top:2px">Komm.</div></div>
      <div><div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#17171A">{{ v.sharesFmt }}</div><div style="font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.06em;text-transform:uppercase;color:#B4B1A9;margin-top:2px">Del.</div></div>
    </div>
  </div>
</article>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:258,&quot;height&quot;:560},&quot;v&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;any&quot;}}"></script>
</body>
</html>
