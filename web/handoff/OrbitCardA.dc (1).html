<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<article style="display:flex;flex-direction:column;background:#FFFFFF;border:1px solid #E7E1D6;border-radius:16px;overflow:hidden;transition:transform .2s ease,box-shadow .2s ease;height:100%;font-family:'Hanken Grotesk',sans-serif" style-hover="transform:translateY(-3px);box-shadow:0 20px 44px -22px rgba(58,38,20,.5)">
  <div style="position:relative;aspect-ratio:9/16;overflow:hidden;background:#EFE7DA">
    <div style="position:absolute;inset:0;background: {{ v.posterA }}"></div>
    <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(26,17,8,.62) 0%,rgba(26,17,8,0) 44%)"></div>
    <span style="position:absolute;left:12px;top:12px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.13em;text-transform:uppercase;background:rgba(255,251,244,.93);color:#1A1714;padding:4px 8px;border-radius:999px">{{ v.platformLabel }}</span>
    <button style="position:absolute;right:12px;top:12px;width:32px;height:32px;border:none;border-radius:999px;background:rgba(255,251,244,.9);color:#1A1714;font-size:14px;cursor:pointer;display:grid;place-items:center;transition:all .15s ease" style-hover="background:#fff;color:#E8460E;transform:scale(1.08)">&#9829;</button>
    <div style="position:absolute;left:14px;bottom:11px;display:flex;align-items:flex-end;gap:6px;color:#fff">
      <span style="font-family:'Newsreader',serif;font-size:36px;line-height:.82;font-weight:500;letter-spacing:-.01em">{{ v.scoreFmt }}</span>
      <span style="font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.16em;text-transform:uppercase;opacity:.82;padding-bottom:5px">Trend</span>
    </div>
    <span style="position:absolute;right:13px;bottom:13px;font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(255,255,255,.9)">{{ v.viewsFmt }} visn.</span>
  </div>
  <div style="display:flex;flex-direction:column;gap:9px;padding:13px 14px 15px">
    <div style="display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:10px;color:#A89A86">
      <span>{{ v.rank2 }}</span><span aria-hidden="true">&middot;</span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">{{ v.handle }}</span>
      <sc-if value="{{ v.breakout }}" hint-placeholder-val="{{ false }}"><span style="margin-left:auto;display:inline-flex;align-items:center;gap:3px;color:#E8460E;flex-shrink:0">&#9650; Breakout</span></sc-if>
    </div>
    <p style="margin:0;font-family:'Newsreader',serif;font-size:16px;line-height:1.28;color:#1A1714;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:41px">{{ v.caption }}</p>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;border-top:1px solid #EFE9DD;padding-top:10px">
      <div><div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#1A1714">{{ v.viewsFmt }}</div><div style="font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:#B7AB97;margin-top:2px">Visn.</div></div>
      <div><div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#1A1714">{{ v.likesFmt }}</div><div style="font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:#B7AB97;margin-top:2px">Likes</div></div>
      <div><div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#1A1714">{{ v.commentsFmt }}</div><div style="font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:#B7AB97;margin-top:2px">Komm.</div></div>
      <div><div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#1A1714">{{ v.sharesFmt }}</div><div style="font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:#B7AB97;margin-top:2px">Del.</div></div>
    </div>
  </div>
</article>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:258,&quot;height&quot;:560},&quot;v&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;any&quot;}}"></script>
</body>
</html>
