<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<article style="display:flex;flex-direction:column;background:#FFFFFF;border:1px solid #E6E1D7;border-radius:16px;overflow:hidden;height:100%;font-family:'Schibsted Grotesk',system-ui,sans-serif;box-shadow:0 1px 2px rgba(40,33,24,.04);transition:transform .22s cubic-bezier(.2,.7,.3,1),box-shadow .22s ease,border-color .22s ease" style-hover="transform:translateY(-4px);box-shadow:0 22px 46px -24px rgba(46,37,26,.42);border-color:#DCD5C8">
  <div style="position:relative;aspect-ratio:9/16;overflow:hidden;background:#EFEBE3">
    <div style="position:absolute;inset:0;background: {{ v.poster }}"></div>
    <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(26,23,19,.58) 0%,rgba(26,23,19,.04) 42%,rgba(26,23,19,0) 64%)"></div>
    <span style="position:absolute;left:11px;top:11px;font-family:'Geist Mono','JetBrains Mono',monospace;font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;background:rgba(255,255,255,.94);color:#1A1713;padding:4px 8px;border-radius:7px;box-shadow:0 1px 4px rgba(0,0,0,.1)">{{ v.platformLabel }}</span>
    <button aria-label="Spara" style="position:absolute;right:11px;top:11px;width:32px;height:32px;border:none;border-radius:10px;background:rgba(255,255,255,.92);color:#1A1713;font-size:13px;cursor:pointer;display:grid;place-items:center;backdrop-filter:blur(2px);transition:all .15s ease;box-shadow:0 1px 5px rgba(0,0,0,.12)" style-hover="background:#fff;color:#A8501E;transform:scale(1.08)">&#9829;</button>
    <div style="position:absolute;left:11px;bottom:11px;display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.95);border-radius:11px;padding:5px 9px 5px 6px;box-shadow:0 3px 12px rgba(0,0,0,.16)">
      <svg width="22" height="22" viewBox="0 0 24 24" style="transform:rotate(-90deg)">
        <circle cx="12" cy="12" r="9" fill="none" stroke="#EDE6DA" stroke-width="3"></circle>
        <circle cx="12" cy="12" r="9" fill="none" stroke="#A8501E" stroke-width="3" stroke-linecap="round" stroke-dasharray="{{ v.scoreDash }}"></circle>
      </svg>
      <span style="display:flex;flex-direction:column;line-height:1">
        <span style="font-family:'Geist Mono','JetBrains Mono',monospace;font-size:12px;font-weight:600;color:#1A1713">{{ v.scoreFmt }}</span>
        <span style="font-family:'Geist Mono','JetBrains Mono',monospace;font-size:7px;letter-spacing:.14em;color:#A39C8E;margin-top:2px">TREND</span>
      </span>
    </div>
    <span style="position:absolute;right:12px;bottom:14px;font-family:'Geist Mono','JetBrains Mono',monospace;font-size:10px;font-weight:500;color:rgba(255,255,255,.94);text-shadow:0 1px 4px rgba(0,0,0,.4)">{{ v.viewsFmt }}</span>
  </div>
  <div style="display:flex;flex-direction:column;gap:9px;padding:13px 14px 14px">
    <div style="display:flex;align-items:center;gap:7px;font-family:'Geist Mono','JetBrains Mono',monospace;font-size:10px;color:#A39C8E">
      <span style="color:#C2541E;font-weight:600">{{ v.rank2 }}</span><span aria-hidden="true">&middot;</span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#6A6359">{{ v.handle }}</span><span aria-hidden="true" style="margin-left:auto">{{ v.time }}</span>
    </div>
    <p style="margin:0;font-size:13.5px;font-weight:500;line-height:1.34;color:#1A1713;letter-spacing:-.005em;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:37px">{{ v.caption }}</p>
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
      <span style="display:inline-flex;align-items:center;gap:7px">
        <svg width="52" height="18" viewBox="0 0 52 18" fill="none"><polyline points="{{ v.spark }}" stroke="#A8501E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></polyline></svg>
        <span style="font-family:'Geist Mono','JetBrains Mono',monospace;font-size:9px;letter-spacing:.08em;color:#A39C8E">tempo</span>
      </span>
      <span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:#8A4218;background:#F4E8DE;border-radius:8px;padding:3px 8px">&#9650; {{ v.outlier }} snittet</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;border-top:1px solid #F0ECE4;padding-top:10px">
      <div><div style="font-family:'Geist Mono','JetBrains Mono',monospace;font-size:12px;font-weight:500;color:#1A1713">{{ v.viewsFmt }}</div><div style="font-family:'Geist Mono','JetBrains Mono',monospace;font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:#B3AC9E;margin-top:3px">Visn.</div></div>
      <div><div style="font-family:'Geist Mono','JetBrains Mono',monospace;font-size:12px;font-weight:500;color:#1A1713">{{ v.likesFmt }}</div><div style="font-family:'Geist Mono','JetBrains Mono',monospace;font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:#B3AC9E;margin-top:3px">Likes</div></div>
      <div><div style="font-family:'Geist Mono','JetBrains Mono',monospace;font-size:12px;font-weight:500;color:#1A1713">{{ v.commentsFmt }}</div><div style="font-family:'Geist Mono','JetBrains Mono',monospace;font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:#B3AC9E;margin-top:3px">Komm.</div></div>
      <div><div style="font-family:'Geist Mono','JetBrains Mono',monospace;font-size:12px;font-weight:500;color:#1A1713">{{ v.sharesFmt }}</div><div style="font-family:'Geist Mono','JetBrains Mono',monospace;font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:#B3AC9E;margin-top:3px">Del.</div></div>
    </div>
  </div>
</article>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:258,&quot;height&quot;:548},&quot;v&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;any&quot;}}"></script>
</body>
</html>
